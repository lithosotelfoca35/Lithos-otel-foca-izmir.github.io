<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lithos Otel | Eski Foça</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f9f6f0; color: #4a4a4a; }
        header { background-color: #3e4a3d; color: white; text-align: center; padding: 40px 20px; }
        
        .ana-yerlesim { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .ana-yerlesim { grid-template-columns: 1fr; } }

        .sol-icerik { display: flex; flex-direction: column; gap: 30px; }
        .sag-sutun { display: flex; flex-direction: column; gap: 25px; }
        
        .sag-kart { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e6e0d4; }
        .hizli-btn { display: block; background-color: #2b78e4; color: white; padding: 12px; text-align: center; font-weight: bold; text-decoration: none; border-radius: 8px; margin-bottom: 10px; }
        
        /* ODA IZGARASI */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 15px; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.3s; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img:hover { transform: scale(1.03); }
        
        footer { text-align: center; padding: 30px; background: #3e4a3d; color: #f9f6f0; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <h1>LİTHOS OTEL FOÇA</h1>
    <p>Foça'nın kalbinde, gürültüden uzak bir huzur vahası.</p>
</header>

<div class="ana-yerlesim">
    <div class="sol-icerik">
        <section>
            <h2>Ahşap Odalar</h2>
            <div class="grid">
                <div class="card"><img src="ahsap1.jpg" onclick="window.open(this.src)"></div>
                <div class="card"><img src="ahsap2.jpg" onclick="window.open(this.src)"></div>
                <div class="card"><img src="ahsap3.jpg" onclick="window.open(this.src)"></div>
                <div class="card"><img src="ahsap4.jpg" onclick="window.open(this.src)"></div>
            </div>
        </section>
        <section>
            <h2>Taş Odalar</h2>
            <div class="grid">
                <div class="card"><img src="tas1.jpg" onclick="window.open(this.src)"></div>
                <div class="card"><img src="tas2.jpg" onclick="window.open(this.src)"></div>
                <div class="card"><img src="tas3.jpg" onclick="window.open(this.src)"></div>
                <div class="card"><img src="tas4.jpg" onclick="window.open(this.src)"></div>
            </div>
        </section>
    </div>

    <div class="sag-sutun">
        <div class="sag-kart">
            <h3>Hızlı İletişim</h3>
            <a href="tel:+902328127788" class="hizli-btn">📞 +90 232 812 77 88</a>
        </div>
        
        <div class="sag-kart">
            <h3>Görüş & Öneri</h3>
            <form id="dilekFormu" action="https://formspree.io/f/mvzjwden" method="POST">
                <input type="text" name="ad_soyad" placeholder="Adınız Soyadınız *" required style="width:100%; padding:8px; margin-bottom:5px; box-sizing:border-box;">
                <textarea name="mesaj" placeholder="Mesajınız..." rows="3" required style="width:100%; padding:8px; margin-bottom:10px; box-sizing:border-box;"></textarea>
                <button type="submit" style="width:100%; padding:10px; background:#3e4a3d; color:white; border:none; border-radius:4px;">Gönder</button>
            </form>
        </div>

        <div class="sag-kart">
            <h3>Konumumuz</h3>
            <iframe src="https://maps.google.com/maps?q=Ismetpasa%20Mah.%20200%20Sok.%20No:26,%20Eski%20Foca&t=&z=15&ie=UTF8&iwloc=&output=embed" width="100%" height="200" style="border:0;"></iframe>
        </div>
    </div>
</div>

<footer>©️ 2026 Lithos Otel Foça. Tüm Hakları Saklıdır.</footer>

</body>
</html>
